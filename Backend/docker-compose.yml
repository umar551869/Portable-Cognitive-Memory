version: "3.9"

services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/pcg
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pcg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
